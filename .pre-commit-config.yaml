# 하네스 엔지니어링 — 커밋 전 자동 검증
#
# 설치:
#   pip install pre-commit
#   pre-commit install
#
# 수동 실행:
#   pre-commit run --all-files

repos:
  - repo: local
    hooks:

      # ── Python: fastapi ────────────────────────────────────────────

      - id: ruff-lint
        name: "[fastapi] Ruff — lint"
        entry: ruff
        args: [check, --fix, fastapi]
        language: system
        pass_filenames: false
        files: ^fastapi/.*\.py$

      - id: ruff-format
        name: "[fastapi] Ruff — format"
        entry: ruff
        args: [format, fastapi]
        language: system
        pass_filenames: false
        files: ^fastapi/.*\.py$

      - id: mypy
        name: "[fastapi] mypy — type check"
        entry: python
        args: [-m, mypy, --config-file, fastapi/pyproject.toml, fastapi]
        language: system
        pass_filenames: false
        files: ^fastapi/.*\.py$

      - id: import-linter
        name: "[fastapi] import-linter — star topology"
        entry: python
        args: [fastapi/scripts/run-lint-imports.py]
        language: system
        pass_filenames: false
        files: ^fastapi/.*\.py$

      - id: validate-harness
        name: "[fastapi] MD 하네스 검증"
        entry: python
        args: [fastapi/scripts/validate-harness.py]
        language: system
        pass_filenames: false
        files: \.md$

      # ── Next.js: nextjs ──────────────────────────────────────────────────

      - id: next-lint
        name: "[nextjs] ESLint"
        entry: pnpm
        args: [--dir, nextjs/v0-titanic-qa-app, lint]
        language: system
        pass_filenames: false
        files: ^nextjs/.*\.(ts|tsx|js|jsx)$

      - id: next-typecheck
        name: "[nextjs] TypeScript — type check"
        entry: pnpm
        args: [--dir, nextjs/v0-titanic-qa-app, type-check]
        language: system
        pass_filenames: false
        files: ^nextjs/.*\.(ts|tsx)$

      - id: next-format-check
        name: "[nextjs] Prettier — format check"
        entry: pnpm
        args: [--dir, nextjs/v0-titanic-qa-app, format:check]
        language: system
        pass_filenames: false
        files: ^nextjs/.*\.(ts|tsx|js|jsx|json|css)$
