[importlinter]
root_packages =
    apps
    core

# Star topology harness: Python import dependency rules
#
# Allowed:  spoke -> star_craft (hub), star_craft -> spoke
# Forbidden: spoke -> spoke (direct)
#
# Run check: lint-imports

[importlinter:contract:spoke-to-spoke-forbidden]
name = Spoke-to-spoke direct import forbidden
type = forbidden
source_modules =
    apps.friday13th
    apps.scout
    apps.titanic
    apps.doro
    apps.agora
    apps.imitation_game
    apps.inception
    apps.kingsman
    apps.silicon_valley
    apps.social_network
forbidden_modules =
    apps.friday13th
    apps.scout
    apps.titanic
    apps.doro
    apps.agora
    apps.imitation_game
    apps.inception
    apps.kingsman
    apps.silicon_valley
    apps.social_network

[importlinter:contract:clean-architecture-inbound-outbound]
name = Hexagonal: inbound must not import outbound directly
type = forbidden
source_modules =
    apps.friday13th.adapter.inbound
    apps.scout.adapter.inbound
    apps.silicon_valley.adapter.inbound
    apps.titanic.adapter.inbound
forbidden_modules =
    apps.friday13th.adapter.outbound
    apps.scout.adapter.outbound
    apps.silicon_valley.adapter.outbound
    apps.titanic.adapter.outbound
