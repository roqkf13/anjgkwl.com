[importlinter]
root_packages =
    apps
    core

# Star topology harness: Python import dependency rules
#
# Allowed:  spoke -> ontology (hub), ontology -> spoke
# Forbidden: spoke -> spoke (direct)
#
# Run check: lint-imports

[importlinter:contract:spoke-to-spoke-forbidden]
name = Spoke-to-spoke direct import forbidden
type = forbidden
source_modules =
    apps.login
    apps.scout
    apps.titanic
    apps.imitation_game
    apps.inception
    apps.kingsman
    apps.admin
    apps.community
    apps.rag
forbidden_modules =
    apps.login
    apps.scout
    apps.titanic
    apps.imitation_game
    apps.inception
    apps.kingsman
    apps.admin
    apps.community
    apps.rag

[importlinter:contract:clean-architecture-inbound-outbound]
name = Hexagonal: inbound must not import outbound directly
type = forbidden
source_modules =
    apps.login.adapter.inbound
    apps.scout.adapter.inbound
    apps.admin.adapter.inbound
    apps.titanic.adapter.inbound
forbidden_modules =
    apps.login.adapter.outbound
    apps.scout.adapter.outbound
    apps.admin.adapter.outbound
    apps.titanic.adapter.outbound
